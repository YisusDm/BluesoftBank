<span class="badge" [class.badge--ahorro]="tipo() === 'CuentaAhorro'" [class.badge--corriente]="tipo() === 'CuentaCorriente'">
  @if (tipo() === 'CuentaAhorro') { <i class="bi bi-piggy-bank" aria-hidden="true"></i> Ahorro }
  @else if (tipo() === 'CuentaCorriente') { <i class="bi bi-building" aria-hidden="true"></i> Corriente }
  @else { {{ tipo() }} }
</span>
